<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Churreria Pinichi</title>
  <style>
    :root {
      --bg: #f4ead7;
      --surface: #fffaf1;
      --text: #3b2414;
      --shadow: 0 18px 40px rgba(80, 44, 17, 0.16);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.65), transparent 40%),
        linear-gradient(180deg, #ecd6b1 0%, var(--bg) 24%, #f8f1e5 100%);
    }

    .menu-page {
      width: min(100%, 560px);
      margin: 0 auto;
      padding: 24px 14px 40px;
    }

    .hero {
      text-align: center;
      background: rgba(255, 250, 241, 0.75);
      border: 1px solid rgba(183, 121, 44, 0.18);
      border-radius: 28px;
      padding: 24px 18px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 2.8rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero p {
      margin: 10px 0 0;
      font-size: 0.98rem;
      color: rgba(59, 36, 20, 0.8);
    }

    .menu-gallery {
      display: grid;
      gap: 18px;
    }

    .menu-card {
      margin: 0;
      padding: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(183, 121, 44, 0.18);
      box-shadow: var(--shadow);
    }

    .menu-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 16px;
    }

    @media (min-width: 700px) {
      .menu-page {
        padding-top: 36px;
        padding-bottom: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="menu-page">
    <header class="hero">
      <h1>Churreria Pinichi</h1>
      <p>Nuestra carta</p>
    </header>

    <section class="menu-gallery" aria-label="Carta del restaurante">
      <figure class="menu-card">
        <img src="pagina-1.png" alt="Pagina 1 de la carta de Churreria Pinichi">
      </figure>

      <figure class="menu-card">
        <img src="pagina-4.png" alt="Pagina 4 de la carta de Churreria Pinichi">
      </figure>

      <figure class="menu-card">
        <img src="pagina-5.png" alt="Pagina 5 de la carta de Churreria Pinichi">
      </figure>

      <figure class="menu-card">
        <img src="pagina-6.png" alt="Pagina 6 de la carta de Churreria Pinichi">
      </figure>
    </section>
  </main>
</body>
</html>
